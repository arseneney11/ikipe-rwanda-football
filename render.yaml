services:
  # Backend API
  - type: web
    name: ikipi-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/app.js
    envVars:
      - key: PLATFORM
        value: Render
      - key: FRONTEND_URL
        fromService:
          name: ikipi-frontend
          type: web
          property: host

  # Frontend static site
  - type: web
    name: ikipi-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ikipi-api
          type: web
          property: host
